name: Install Dependencies

on:
  workflow_dispatch:

permissions:
  contents: write   # 👈 THIS FIXES THE ERROR

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install GSAP and D3
        run: |
          npm init -y
          npm install gsap d3

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add package.json package-lock.json
          git commit -m "Installed gsap and d3" || echo "No changes"
          git push
