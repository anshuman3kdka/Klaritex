<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Klaritex Ambiguity Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="dashboard">
      <header class="dashboard__header">
        <h1>Ambiguity Dashboard</h1>
        <p>
          Paste any statement (up to 10,000 characters), send it to Gemini 3 Flash,
          and get an ambiguity score out of 10.
        </p>
      </header>

      <section class="card">
        <label for="api-key">Gemini API Key</label>
        <input
          id="api-key"
          class="input"
          type="password"
          autocomplete="off"
          placeholder="Paste your Gemini API key"
        />
        <p class="hint">Your key stays in this browser tab and is not saved by Klaritex.</p>
      </section>

      <section class="card">
        <label for="input-text">Text to Analyze</label>
        <textarea
          id="input-text"
          class="textarea"
          maxlength="10000"
          placeholder="Enter your text here..."
        ></textarea>
        <div class="meta-row">
          <span id="char-count">0 / 10000 characters</span>
          <button id="analyze-btn" class="button" type="button">Analyze Ambiguity</button>
        </div>
      </section>

      <section class="card result-card" aria-live="polite">
        <h2>Result</h2>
        <p id="status" class="status">Enter text and click Analyze.</p>
        <p id="score" class="score">-- / 10</p>
        <p id="tier" class="tier">Tier: --</p>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
