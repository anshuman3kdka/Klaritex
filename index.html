<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Klaritex Ambiguity Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="brand-bar" aria-label="Klaritex brand bar">
      <span class="brand-bar__name">Klaritex</span>
      <span class="brand-bar__tagline">Clear language, fewer misunderstandings</span>
      <button
        id="theme-toggle"
        class="button button--secondary"
        type="button"
        aria-label="Switch to light theme"
        aria-pressed="false"
      >
        Light theme
      </button>
    </div>

    <main class="dashboard">
      <header class="dashboard__header">
        <h1>Ambiguity Dashboard</h1>
        <p>
          Paste any statement (up to 10,000 characters), send it to Gemini 3 Flash,
          and get an ambiguity score out of 10.
        </p>
        <div class="example-chips" aria-label="Example text options">
          <button
            class="example-chip"
            type="button"
            data-example-key="contract-sentence"
            aria-label="Use contract sentence example"
          >
            Contract sentence
          </button>
          <button
            class="example-chip"
            type="button"
            data-example-key="policy-statement"
            aria-label="Use policy statement example"
          >
            Policy statement
          </button>
          <button
            class="example-chip"
            type="button"
            data-example-key="customer-support-message"
            aria-label="Use customer support message example"
          >
            Customer support message
          </button>
        </div>
      </header>

      <div class="workspace-grid">
        <section class="card">
          <label for="input-text">Text to Analyze</label>
          <textarea
            id="input-text"
            class="textarea"
            maxlength="10000"
            placeholder="Enter your text here..."
          ></textarea>
          <div class="input-actions">
            <span id="char-count">0 / 10000 characters</span>
            <button
              id="analyze-btn"
              class="button"
              type="button"
              aria-label="Analyze text for ambiguity"
            >
              Analyze Ambiguity
            </button>
          </div>
        </section>

        <section class="card result-card" aria-live="polite">
          <div class="result-header">
            <h2>Result</h2>
            <div class="result-actions" aria-label="Result actions">
              <button
                id="copy-result-btn"
                class="button button--secondary"
                type="button"
                aria-label="Copy analysis result"
                disabled
              >
                Copy
              </button>
              <button
                id="download-result-btn"
                class="button button--secondary"
                type="button"
                aria-label="Download analysis result as text file"
                disabled
              >
                Download .txt
              </button>
            </div>
          </div>
          <p id="status" class="status">Enter text and click Analyze.</p>
          <div id="score-badge" class="score-badge" hidden></div>
          <div id="visual-summary" class="visual-summary" hidden></div>
          <div id="result-html" class="result-html"></div>
        </section>
      </div>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
