media:
  input: public/media
  output: /media

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: content/posts
    view:
      fields: [title, date, published]
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
      - name: slug
        label: Slug
        type: string
        required: true
      - name: excerpt
        label: Excerpt
        type: text
      - name: published
        label: Published
        type: boolean
        default: false
      - name: body
        label: Body
        type: rich-text
  - name: api-config
    label: API Settings
    type: file
    path: content/settings/api-config.json
    fields:
      - name: quick_provider
        label: "⚡ Quick Mode Provider"
        type: select
        required: true
        options:
          - value: groq
            label: "Groq (faster, free tier)"
          - value: gemini
            label: "Gemini (Google)"
      - name: deep_provider
        label: "🔍 Deep Mode Provider"
        type: select
        required: true
        options:
          - value: groq
            label: "Groq (faster, free tier)"
          - value: gemini
            label: "Gemini (Google)"
